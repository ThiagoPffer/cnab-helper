<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNAB helper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/styles/normalize.css">
    <link rel="stylesheet" href="src/styles/style.css">
</head>
<body>
    <section style="display: flex; flex-direction: column; gap: 16px;">
        <header>
            <h1>CNAB Helper</h1>
        </header>
    
        <section class="cnab-selection-container">
            <section id="bank-selection" style="transition: .2s">
                <header>
                    <h4 class="selection-label">Selecione um banco para iniciar</h4>
                </header>
                <div class="row-container justify-center">
                    <div class="bank-card" id="b341" onclick="selectBank('341')">
                        <img src="src/assets/itau-logo-2023.svg" alt="Banco Itaú">
                        <span>Banco Itaú</spa/n>
                    </div>
                </div>
            </section>
    
            <section id="cnab-selection" class="d-none" style="transition: .2s">
                <header>
                    <h4 class="selection-label">Selecione um CNAB deste banco</h4>
                </header>
                <div class="button-row-container">
                    <button class="cnab-button" id="c400" type="button" onclick="selectCnab('400')">CNAB 400</button>
                    <button class="cnab-button" id="c240" type="button" onclick="selectCnab('240')">CNAB 240</button>
                </div>
            </section>

            <section id="file-selection" class="d-none" style="transition: .2s">
                <header>
                    <h4 class="selection-label">Selecione o tipo de arquivo</h4>
                </header>
                <div class="button-row-container">
                    <button class="file-button" id="ret" type="button" onclick="selectFile('ret')">Retorno</button>
                    <button class="file-button" id="rem" type="button" onclick="selectFile('rem')">Remessa</button>
                </div>
            </section>
        </section>
    
        <section id="text-area-container" class="d-none" style="margin-top: 45px;">
            <div class="column-container justify-center align-center mw-80 m-0-auto gap-16">
                <header>
                    <h4 class="selection-label">Para finalizar, insira na caixa de texto abaixo o conteúdo do arquivo e clique em "Iniciar", 
                        <br>
                        ou gere um arquivo novo em "Gerar arquivo zerado"</h4>
                </header>
                <textarea id="text-area-input" cols="30" rows="10"></textarea>
                <div class="row-container justify-center align-center gap-16">
                    <button class="start-button" id="start" type="button" onclick="start(false)">Iniciar</button>
                    <button class="start-zero-button" id="start" type="button" onclick="start(true)">Gerar arquivo zerado</button>
                </div>
            </div>
        </section>
    
        <section id="text-editor" class="d-none p-v-25">
            <div class="column-container justify-center align-center mw-80 m-0-auto">
                <div id="description-display" class="d-none"></div>
                &#8203;
                <div class="row-container justify-start align-center">
                    <button class="export-content-button" id="start" type="button" onclick="exportContent()">Exportar conteúdo</button>
                </div>
                &#8203;
                <div id="text-editor-container">
                    <div id="line-counter-container"></div>
                    <div id="text-editor-display" onblur="onBlur(event)"></div>
                </div>
                &#8203;
                <div class="row-container">
                    <div class="details-container">
                        <span>Posição: </span>
                        <span id="caret-position-label"></span>
                    </div>
                </div>
                <div id="error-display" class="d-none"></div>
                <button class="back-button" id="back" type="button" onclick="goBack()">Voltar</button>
            </div>
        </section>
    </section>

        <li>
            <input type="checkbox" /> Atribuir função de busca de segmentos ao escopo do cnab selecionado
        </li>
        <li>
            <input type="checkbox" /> Permitir trocar de linhas usando as setas pra cima e baixo
        </li>
        <li>
            <input type="checkbox" /> Inserir notas do cnab
        </li>
    </ul> -->
    <script src="src/js/itau400ret.js"></script>
    <script src="src/js/index.js"></script>
</body>
</html>
